name: Run my custom action

on:
    workflow_dispatch:

jobs:
    job_1:
        runs-on: ubuntu-latest
        steps:
        -   name: Check out repo to use the action locally
            uses: actions/checkout@v6.0.2

        -   name: Run my custom action docker action
            uses: ./.github/actions/docker-container
            with:
                input_one: "Hello"
                input_two: "World"
        -   name: Run my custom action composite action
            uses: ./.github/actions/composite